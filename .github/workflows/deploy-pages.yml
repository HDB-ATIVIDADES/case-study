name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate PDF from relatório
        run: |
          docker run --rm -v "$PWD":/data pandoc/latex:latest \
            /bin/sh -c "\
            pandoc docs/relatorio-final.md -o docs/relatorio-final.pdf \
            -V geometry:margin=1.8cm -V fontsize=10pt --pdf-engine=xelatex"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
