name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Sphinx
        run: pip install -r docs/requirements-docs.txt

      - name: Build HTML site
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pandoc texlive-latex-base texlive-latex-recommended texlive-fonts-recommended
          sphinx-build -b html docs _build/html
          pandoc docs/relatorio-final.md -o _build/html/relatorio-final.pdf \
            -H docs/_templates/abnt-pdf.tex \
            -V geometry:"top=3cm,bottom=2cm,left=3cm,right=2cm" \
            -V fontsize=12pt --pdf-engine=pdflatex
        env:
          SITE_URL: https://hdb-atividades.github.io/case-study

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
