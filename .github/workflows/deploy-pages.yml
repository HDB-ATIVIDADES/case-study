name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate PDF and HTML from markdown
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pandoc texlive-latex-base texlive-latex-recommended texlive-fonts-recommended
          # PDF
          pandoc docs/relatorio-final.md -o docs/relatorio-final.pdf \
            -V geometry:margin=1.8cm -V fontsize=10pt --pdf-engine=pdflatex
          # HTML pages (GitHub Pages serves uploaded files as static, .md is not rendered)
          find docs -name '*.md' ! -path '*/node_modules/*' | while read -r f; do
            html="${f%.md}.html"
            pandoc "$f" -o "$html" --standalone --metadata title="Estudo de Caso: DevSecOps"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
